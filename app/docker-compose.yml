version: '3.8'

services:
  # Next.js Application
  node_app:
    container_name: fantasy_portal_node
    image: node:22-alpine
    working_dir: /app
    ports:
      - "25035:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    networks:
      - duplecake-net

  # PostgreSQL Database
  db_postgres:
    container_name: fantasy_portal_db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fp_user
      POSTGRES_PASSWORD: fp_password
      POSTGRES_DB: fantasy_portal_db
    volumes:
      - ./database/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - duplecake-net

  # Redis Cache
  cache_redis:
    container_name: fantasy_portal_redis
    image: redis:7-alpine
    volumes:
      - ./database/redis:/data
    restart: unless-stopped
    networks:
      - duplecake-net

  # pgAdmin for Database Management
  pgadmin:
    container_name: fantasy_portal_pgadmin
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'True'
    ports:
      - "25036:80"
    volumes:
      - ./database/pgadmin/servers.json:/pgadmin4/servers.json
      - ./database/pgadmin/pgpass:/var/lib/pgadmin/pgpass
    networks:
      - duplecake-net

  # MinIO for Blob Storage
  storage_minio:
    container_name: fantasy_portal_minio
    image: minio/minio
    restart: unless-stopped
    ports:
      - "25037:9000"
      - "25038:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./database/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - duplecake-net

networks:
  duplecake-net:
    external: true
